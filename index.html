<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gungun Arora — Journalist · Cinematographer · Visual Storyteller</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #080308;
            --bg2:       #0d050f;
            --bg3:       #120714;
            --aubergine: #280b2c;
            --plum:      #3a1040;
            --gold:      #c8973a;
            --gold-l:    #dfa94a;
            --gold-d:    #9a7228;
            --silver:    #b0b0c4;
            --silver-l:  #dcdcf0;
            --blush:     #cc7d96;
            --blush-l:   #eaafc0;
            --blush-d:   #994468;
            --parchment: #f2e8d0;
            --text:      #d0c0d8;
            --text-dim:  #806880;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            cursor: none;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--gold), var(--blush), var(--silver));
        }

        /* CURSOR */
        .cursor {
            position: fixed;
            width: 8px; height: 8px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%,-50%);
            transition: transform 0.15s;
        }
        .cursor-ring {
            position: fixed;
            width: 36px; height: 36px;
            border: 1px solid rgba(200,151,58,0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%,-50%);
            transition: all 0.18s ease;
        }

        /* NAV — logo only */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 28px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.5s ease;
            pointer-events: none;
        }
        nav.scrolled {
            padding: 18px 60px;
            background: rgba(8,3,8,0.94);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(200,151,58,0.07);
            pointer-events: all;
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 4px;
            text-decoration: none;
            background: linear-gradient(135deg, var(--gold), var(--blush), var(--silver));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200%;
            animation: gradShift 7s ease infinite;
            pointer-events: all;
        }
        @keyframes gradShift {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        /* HAMBURGER */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: none;
            z-index: 1001;
            pointer-events: all;
        }
        .hamburger span {
            width: 26px; height: 1px;
            background: var(--gold);
            display: block;
            transition: all 0.4s;
        }
        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px,4px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px,-4px); }

        /* MOBILE MENU */
        .mobile-menu {
            position: fixed;
            inset: 0;
            background: rgba(8,3,8,0.98);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .mobile-menu.open { opacity: 1; pointer-events: all; }
        .mobile-menu a {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            color: var(--parchment);
            text-decoration: none;
            letter-spacing: 3px;
            transition: color 0.3s;
        }
        .mobile-menu a:hover { color: var(--gold); }

        /* ===== HERO ===== */
        #hero {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
            padding: 0;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 60% 30%, rgba(58,16,64,0.65) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 80%, rgba(200,151,58,0.07) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 75%, rgba(204,125,150,0.05) 0%, transparent 40%),
                var(--bg);
        }

        .hero-grain {
            position: absolute;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px;
            pointer-events: none;
        }

        .hero-inner {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 140px 60px 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .hero-pre {
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--blush);
            margin-bottom: 36px;
            opacity: 0;
            animation: silkRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards 0.3s;
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .hero-pre::before {
            content: '';
            width: 40px; height: 1px;
            background: linear-gradient(to right, var(--blush), transparent);
            flex-shrink: 0;
        }

        .hero-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(64px, 10vw, 140px);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -2px;
            margin-bottom: 36px;
            opacity: 0;
            animation: silkRise 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
        }
        .hero-name .n1 {
            display: block;
            background: linear-gradient(135deg, var(--parchment) 0%, var(--gold) 45%, var(--parchment) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200%;
            animation: silkRise 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.5s,
                       shimA 9s ease infinite 2s;
        }
        .hero-name .n2 {
            display: block;
            background: linear-gradient(135deg, var(--silver) 0%, var(--blush-l) 50%, var(--silver) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200%;
            animation: silkRise 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.7s,
                       shimB 9s ease infinite 3s;
        }
        @keyframes shimA {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        @keyframes shimB {
            0%,100% { background-position: 100% 50%; }
            50%      { background-position: 0% 50%; }
        }

        .hero-tagline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(18px, 2.2vw, 28px);
            font-weight: 400;
            font-style: italic;
            color: var(--parchment);
            margin-bottom: 12px;
            opacity: 0;
            animation: silkRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards 0.9s;
            line-height: 1.55;
            max-width: 640px;
        }
        .hero-tagline em { color: var(--gold); font-style: normal; }

        .hero-sub {
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 44px;
            opacity: 0;
            animation: silkRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards 1s;
            max-width: 560px;
        }

        .hero-roles {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 48px;
            opacity: 0;
            animation: silkRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards 1.1s;
        }
        .role-pill {
            padding: 7px 20px;
            border: 1px solid rgba(200,151,58,0.22);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            border-radius: 40px;
            background: rgba(200,151,58,0.04);
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
        }
        .role-pill:hover {
            background: rgba(200,151,58,0.12);
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .hero-ctas {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            opacity: 0;
            animation: silkRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards 1.3s;
            margin-bottom: 80px;
        }

        .hero-scroll-row {
            opacity: 0;
            animation: silkRise 1s ease forwards 2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .scroll-line {
            width: 56px; height: 1px;
            background: linear-gradient(to right, transparent, var(--gold));
            position: relative;
            overflow: hidden;
        }
        .scroll-line::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold-l);
            animation: scan 2.2s ease infinite;
        }
        @keyframes scan {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .scroll-txt {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* side stats — desktop only, absolutely positioned */
        .hero-side-stats {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 28px;
            opacity: 0;
            animation: silkRise 1.2s cubic-bezier(0.16,1,0.3,1) forwards 1.6s;
            z-index: 2;
        }
        .hss-item { text-align: right; }
        .hss-num {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 400;
            background: linear-gradient(135deg, var(--gold), var(--blush));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .hss-lbl {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .hss-div {
            width: 1px; height: 32px;
            background: linear-gradient(to bottom, transparent, rgba(200,151,58,0.4), transparent);
            margin-left: auto;
        }

        @keyframes silkRise {
            from { opacity:0; transform: translateY(40px); filter: blur(8px); }
            to   { opacity:1; transform: translateY(0);    filter: blur(0);   }
        }

        /* BUTTONS */
        .btn-silk {
            padding: 16px 44px;
            background: linear-gradient(135deg, var(--gold-d), var(--gold), var(--gold-l));
            color: var(--bg);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
            border-radius: 2px;
            transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
            display: inline-block;
        }
        .btn-silk:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(200,151,58,0.22);
        }
        .btn-linen {
            padding: 16px 44px;
            border: 1px solid rgba(204,125,150,0.35);
            color: var(--blush-l);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
            display: inline-block;
        }
        .btn-linen:hover {
            background: rgba(204,125,150,0.08);
            border-color: var(--blush);
            transform: translateY(-4px);
        }

        /* ===== SECTIONS SHARED ===== */
        .section-pad { padding: 140px 60px; }

        .eyebrow {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--blush);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .eyebrow::before {
            content: '';
            width: 30px; height: 1px;
            background: linear-gradient(to right, var(--blush), transparent);
            flex-shrink: 0;
        }

        .sec-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 4vw, 60px);
            font-weight: 500;
            line-height: 1.12;
            margin-bottom: 48px;
            color: var(--parchment);
        }
        .sec-title em { font-style: italic; color: var(--gold); }
        .sec-title .sil {
            background: linear-gradient(135deg, var(--silver), var(--blush-l));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== ABOUT ===== */
        #about {
            padding: 140px 60px;
            display: grid;
            grid-template-columns: 1fr 1.15fr;
            gap: 90px;
            align-items: start;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        #about::before {
            content: '';
            position: absolute;
            top: -150px; right: -150px;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(58,16,64,0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        .about-visual { position: sticky; top: 110px; }

        .about-img-wrap { position: relative; display: inline-block; width: 100%; }

        .about-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            object-position: top;
            display: block;
            filter: saturate(0.85) contrast(1.1) sepia(0.08);
            transition: filter 0.7s ease;
        }
        .about-img:hover { filter: saturate(1) contrast(1.1) sepia(0); }

        .about-img-fade {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 55%, rgba(8,3,8,0.38));
            pointer-events: none;
        }

        .about-border {
            position: absolute;
            top: 18px; left: -18px; right: 18px; bottom: -18px;
            border: 1px solid rgba(200,151,58,0.18);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
        }
        .about-img-wrap:hover .about-border {
            top: 12px; left: -12px; right: 12px; bottom: -12px;
            border-color: rgba(200,151,58,0.45);
        }

        .corner { position: absolute; width: 18px; height: 18px; }
        .corner.tl { top:-1px; left:-1px; border-top:2px solid var(--gold); border-left:2px solid var(--gold); }
        .corner.tr { top:-1px; right:-1px; border-top:2px solid var(--blush); border-right:2px solid var(--blush); }
        .corner.bl { bottom:-1px; left:-1px; border-bottom:2px solid var(--blush); border-left:2px solid var(--blush); }
        .corner.br { bottom:-1px; right:-1px; border-bottom:2px solid var(--gold); border-right:2px solid var(--gold); }

        .about-caption {
            margin-top: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .about-caption-txt {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
        }
        .about-caption-line {
            flex: 1; height: 1px;
            background: linear-gradient(to right, rgba(200,151,58,0.25), transparent);
        }

        .about-text-col { padding-top: 16px; }

        .para {
            font-size: 15px;
            line-height: 2;
            color: var(--text);
            opacity: 0.82;
            margin-bottom: 22px;
        }
        .para strong { color: var(--gold); font-weight: 400; }
        .para .bls   { color: var(--blush-l); }

        .pull-quote {
            margin: 44px 0;
            padding: 28px 36px;
            border-left: 2px solid var(--gold);
            background: linear-gradient(135deg, rgba(200,151,58,0.04), rgba(204,125,150,0.03));
            position: relative;
        }
        .pull-quote::before {
            content: '"';
            position: absolute;
            top: -16px; left: 28px;
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            color: var(--gold);
            opacity: 0.18;
            line-height: 1;
        }
        .pull-quote p {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-style: italic;
            color: var(--blush-l);
            line-height: 1.7;
